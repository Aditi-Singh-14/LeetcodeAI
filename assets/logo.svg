<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#1e3a8a" />
  
  <!-- Brain/Neural Network Pattern -->
  <g stroke="#60a5fa" stroke-width="2" fill="none">
    <!-- Neural connections -->
    <path d="M 50 80 Q 70 70, 90 80" opacity="0.6"/>
    <path d="M 90 80 Q 110 70, 130 80" opacity="0.6"/>
    <path d="M 110 100 Q 130 90, 150 100" opacity="0.6"/>
    <path d="M 50 120 Q 70 110, 90 120" opacity="0.6"/>
    <path d="M 90 120 Q 110 130, 130 120" opacity="0.6"/>
  </g>
  
  <!-- Neurons/Nodes -->
  <circle cx="50" cy="80" r="4" fill="#60a5fa"/>
  <circle cx="90" cy="80" r="4" fill="#60a5fa"/>
  <circle cx="130" cy="80" r="4" fill="#60a5fa"/>
  <circle cx="150" cy="100" r="4" fill="#60a5fa"/>
  <circle cx="50" cy="120" r="4" fill="#60a5fa"/>
  <circle cx="90" cy="120" r="4" fill="#60a5fa"/>
  <circle cx="130" cy="120" r="4" fill="#60a5fa"/>
  
  <!-- Code Brackets -->
  <g fill="#fbbf24" font-family="monospace" font-size="48" font-weight="bold">
    <text x="30" y="110" opacity="0.9">&lt;</text>
    <text x="155" y="110" opacity="0.9">&gt;</text>
  </g>
  
  <!-- Central Brain Icon -->
  <g transform="translate(100, 100)">
    <!-- Brain outline -->
    <path d="M -15,-20 Q -25,-10 -20,5 Q -15,15 0,15 Q 15,15 20,5 Q 25,-10 15,-20 Q 5,-25 0,-22 Q -5,-25 -15,-20" 
          fill="#3b82f6" stroke="#60a5fa" stroke-width="1.5"/>
    <!-- Brain folds -->
    <path d="M -10,-15 Q -8,-10 -10,-5" stroke="#1e3a8a" stroke-width="1" fill="none"/>
    <path d="M 0,-18 Q 2,-12 0,-8" stroke="#1e3a8a" stroke-width="1" fill="none"/>
    <path d="M 10,-15 Q 8,-10 10,-5" stroke="#1e3a8a" stroke-width="1" fill="none"/>
  </g>
  
  <!-- "AI" Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="#fbbf24" text-anchor="middle">AI</text>
</svg>
